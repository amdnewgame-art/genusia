<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenusIA — Identifica cualquier componente electrónico</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #07080b;
  --surface:   #0d0f14;
  --surface2:  #131720;
  --border:    #1c2130;
  --border2:   #2a3347;
  --gold:      #f0b429;
  --gold-dim:  #7a5c14;
  --cyan:      #38bdf8;
  --green:     #34d399;
  --red:       #f87171;
  --text:      #dde3ef;
  --muted:     #556070;
  --syne:      'Syne', sans-serif;
  --mono:      'DM Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--syne);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999; opacity:.5;
}

.orb {
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
  z-index:0;
}
.orb-1 { width:500px;height:500px; background:rgba(240,180,41,0.06); top:-100px; left:-100px; }
.orb-2 { width:400px;height:400px; background:rgba(56,189,248,0.05); bottom:-80px; right:-80px; }

.wrap {
  position:relative; z-index:1;
  max-width:860px;
  margin:0 auto;
  padding:0 20px 60px;
}

nav {
  display:flex; align-items:center; gap:12px;
  padding:28px 0 36px;
  border-bottom:1px solid var(--border);
  margin-bottom:48px;
  animation: fadeDown .6s ease both;
}

.nav-logo {
  display:flex; align-items:center; gap:10px;
  text-decoration:none;
}

.logo-mark {
  position:relative;
  width:38px; height:38px;
}
.logo-mark svg { width:38px; height:38px; }

.logo-name {
  font-size:24px;
  font-weight:900;
  letter-spacing:-1px;
  color:#fff;
}
.logo-name span { color:var(--gold); }

.logo-tag {
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:1.5px;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:2px;
}

.nav-right {
  margin-left:auto;
  display:flex; align-items:center; gap:10px;
}

.pill {
  font-family:var(--mono);
  font-size:10px;
  padding:4px 12px;
  border-radius:100px;
  letter-spacing:1px;
}
.pill-free {
  background:rgba(52,211,153,0.1);
  border:1px solid rgba(52,211,153,0.25);
  color:var(--green);
}

.hero {
  text-align:center;
  padding-bottom:48px;
  animation: fadeUp .7s .1s ease both;
}

.hero-eyebrow {
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:3px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:18px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content:''; flex:1; max-width:60px;
  height:1px; background:linear-gradient(90deg, transparent, var(--gold-dim));
}
.hero-eyebrow::after { transform:scaleX(-1); }

.hero h1 {
  font-size:clamp(32px, 6vw, 58px);
  font-weight:900;
  line-height:1.05;
  letter-spacing:-2px;
  color:#fff;
  margin-bottom:16px;
}
.hero h1 em {
  font-style:normal;
  background: linear-gradient(135deg, var(--gold), #fde68a, var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero p {
  font-size:16px;
  color:var(--muted);
  max-width:500px;
  margin:0 auto;
  line-height:1.6;
  font-weight:400;
}

.counter-bar {
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin-top:24px;
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
}
.counter-dots {
  display:flex; gap:4px;
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  transition: all .3s;
}
.dot.used { background:var(--border2); box-shadow:none; }
.dot.last { background:var(--red); box-shadow:0 0 6px var(--red); }

.upload-area {
  position:relative;
  border:1.5px dashed var(--border2);
  border-radius:20px;
  padding:52px 24px;
  text-align:center;
  cursor:pointer;
  background:var(--surface);
  transition:all .3s;
  overflow:hidden;
  animation: fadeUp .7s .2s ease both;
}

.upload-area::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(240,180,41,0.07) 0%, transparent 65%);
  pointer-events:none;
}

.upload-area:hover, .upload-area.drag {
  border-color:var(--gold-dim);
  background:rgba(240,180,41,0.03);
}

.upload-icon-wrap {
  width:72px; height:72px;
  margin:0 auto 20px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:18px;
  display:grid; place-items:center;
  font-size:32px;
  position:relative;
  transition:transform .3s;
}

.upload-area h2 {
  font-size:20px;
  font-weight:800;
  color:#fff;
  margin-bottom:8px;
}
.upload-area p {
  font-size:13px;
  color:var(--muted);
  margin-bottom:28px;
  max-width:380px;
  margin-left:auto; margin-right:auto;
}

.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

.btn {
  font-family:var(--syne);
  font-weight:700;
  font-size:13px;
  padding:11px 22px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition:all .2s;
}
.btn-gold { background:var(--gold); color:#000; }
.btn-outline { background:transparent; color:var(--cyan); border:1px solid rgba(56,189,248,.3); }

#fileInput, #camInput { display:none; }

.preview-wrap {
  display:none;
  gap:20px;
  margin-bottom:20px;
}
.preview-wrap.on { display:flex; flex-wrap:wrap; align-items:flex-start; }

.preview-img-box {
  flex:0 0 240px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border2);
  background:var(--surface);
}
.preview-img-box img { width:100%; height:200px; object-fit:cover; display:block; }

.analyze-box { flex:1; min-width:200px; display:flex; flex-direction:column; gap:12px; }

.btn-analyze {
  background:linear-gradient(135deg, var(--gold), #fbbf24);
  color:#000; border:none; padding:14px 24px; border-radius:12px;
  font-family:var(--syne); font-weight:900; cursor:pointer;
}

.loader {
  display:none; background:var(--surface); border:1px solid var(--border2);
  border-radius:20px; padding:40px; text-align:center; margin-bottom:20px;
}
.loader.on { display:block; }

.results { display:none; flex-direction:column; gap:16px; }
.results.on { display:flex; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 20px; }
.card-lbl { font-family:var(--mono); font-size:9px; color:var(--gold); text-transform:uppercase; margin-bottom:10px; }
.card-big { font-size:26px; font-weight:900; color:#fff; }

.search-section { margin-bottom: 20px; }
.search-wrap {
  display: flex; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 16px; padding: 6px 6px 6px 20px; gap: 10px;
}
.search-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); }
.search-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; }

.err-box {
  display:none; background:rgba(248,113,113,.07); border:1px solid rgba(248,113,113,.25);
  border-radius:14px; padding:18px 22px; font-family:var(--mono); color:var(--red); margin-bottom:20px;
}
.err-box.on { display:block; }

@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="wrap">
  <nav>
    <div class="logo-name">Genus<span>IA</span></div>
    <div class="nav-right">
      <div class="pill pill-free">✦ Versión 1.5 Flash Activa</div>
    </div>
  </nav>

  <div class="hero">
    <h1>GenusIA — Experto <em>1.5 Flash.</em></h1>
    <p>Identificación precisa de componentes con mayor estabilidad y cuota gratuita.</p>
    <div class="counter-bar">
      <div class="counter-dots" id="counterDots"></div>
      <span id="counterText">5 disponibles hoy</span>
    </div>
  </div>

  <div class="search-section">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Busca NE555, 2N3904, etc...">
      <button class="search-btn" onclick="searchComponent()">Consultar</button>
    </div>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon-wrap">⚡</div>
    <h2>Sube la foto del componente</h2>
    <div class="btn-row">
      <button class="btn btn-gold" onclick="document.getElementById('fileInput').click()">📁 Galería</button>
      <button class="btn btn-outline" onclick="document.getElementById('camInput').click()">📷 Cámara</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="loadFile(this)">
    <input type="file" id="camInput" accept="image/*" capture="environment" onchange="loadFile(this)">
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-img-box"><img id="prevImg" src=""></div>
    <div class="analyze-box">
      <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">🔍 Analizar con Gemini 1.5</button>
      <button class="btn btn-outline" onclick="reset()">↺ Cancelar</button>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="loader-step" id="loaderStep">Analizando con Gemini 1.5 Flash...</div>
  </div>

  <div class="err-box" id="errBox"></div>
  <div class="results" id="results"></div>
</div>

<script>
const MAX_FREE = 5;
let used = parseInt(localStorage.getItem('genus_used') || '0');
let imageB64 = null, imageMime = 'image/jpeg';
const GEMINI_KEY = 'AIzaSyDMoQ7As10_YRWSvQvc8gXODzDKypj4h6E';

function renderCounter() {
  const dots = document.getElementById('counterDots');
  const txt = document.getElementById('counterText');
  dots.innerHTML = '';
  for (let i = 0; i < MAX_FREE; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < used ? ' used' : '');
    dots.appendChild(d);
  }
  txt.textContent = `${MAX_FREE - used} consultas disponibles`;
}
renderCounter();

function loadFile(input) {
  if (!input.files?.[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    imageB64 = e.target.result.split(',')[1];
    document.getElementById('prevImg').src = e.target.result;
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('previewWrap').classList.add('on');
  };
  reader.readAsDataURL(input.files[0]);
}

function reset() {
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('previewWrap').classList.remove('on');
  document.getElementById('results').classList.remove('on');
}

async function searchComponent() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query || used >= MAX_FREE) return;

  document.getElementById('loader').classList.add('on');
  const prompt = `Devuelve JSON para el componente: ${query}. Estructura: {tipo, nombre_completo, numero_parte, para_que_sirve, especificaciones:{}}`;

  try {
    // CAMBIO A MODELO 1.5 FLASH
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method:'POST',
      body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
    });
    const data = await res.json();
    const info = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g,''));
    used++; localStorage.setItem('genus_used', used); renderCounter();
    document.getElementById('loader').classList.remove('on');
    renderResults(info);
  } catch(e) { 
    document.getElementById('loader').classList.remove('on');
    alert("Error de cuota o conexión. Intenta de nuevo."); 
  }
}

async function analyze() {
  if (!imageB64 || used >= MAX_FREE) return;
  document.getElementById('loader').classList.add('on');

  const prompt = `Analiza la imagen de este componente electrónico. Devuelve SOLO JSON: {tipo, nombre_completo, numero_parte, para_que_sirve, especificaciones:{}}`;

  try {
    // CAMBIO A MODELO 1.5 FLASH PARA VISIÓN
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method:'POST',
      body: JSON.stringify({
        contents:[{ parts:[{ inline_data:{ mime_type: "image/jpeg", data: imageB64 } }, { text: prompt }] }]
      })
    });
    const data = await res.json();
    const info = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g,''));
    used++; localStorage.setItem('genus_used', used); renderCounter();
    document.getElementById('loader').classList.remove('on');
    renderResults(info);
  } catch(e) { 
    document.getElementById('loader').classList.remove('on');
    alert("Límite de API alcanzado o imagen muy pesada."); 
  }
}

function renderResults(d) {
  const res = document.getElementById('results');
  res.innerHTML = `
    <div class="card">
      <div class="card-lbl">Identificado como:</div>
      <div class="card-big">${d.nombre_completo || d.numero_parte}</div>
      <p style="margin-top:10px">${d.para_que_sirve}</p>
    </div>
    <button class="btn btn-gold" onclick="reset()">Nueva búsqueda</button>
  `;
  res.classList.add('on');
}
</script>
</body>
</html>
